# PhoenixGPU Helm Chart Values
# See docs/user-guide/helm-configuration.md for full reference

global:
  imageRegistry: ghcr.io/wlqtjl/phoenixgpu
  imagePullPolicy: IfNotPresent
  namespace: phoenixgpu-system

# ── Phoenix HA Controller ─────────────────────────────────────────
phoenixController:
  enabled: true
  image:
    repository: phoenix-controller
    tag: latest
  replicaCount: 1
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
  config:
    checkpointIntervalSeconds: 300
    faultDetectorPollSeconds: 10
    notReadyThresholdSeconds: 30
    maxRestoreAttempts: 3
    restoreTimeoutSeconds: 120

# ── Device Plugin ─────────────────────────────────────────────────
devicePlugin:
  enabled: true
  image:
    repository: device-plugin
    tag: latest
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 256Mi
  config:
    # GPU resource names to register
    resourceName: nvidia.com/vgpu
    memoryResourceName: nvidia.com/vgpu-memory

# ── Scheduler Extender ────────────────────────────────────────────
schedulerExtender:
  enabled: true
  image:
    repository: scheduler-extender
    tag: latest
  replicaCount: 1
  config:
    schedulingPolicy: binpack   # binpack | spread
    numaAware: true

# ── Billing Engine ────────────────────────────────────────────────
billingEngine:
  enabled: true
  image:
    repository: billing-engine
    tag: latest
  config:
    collectionIntervalSeconds: 60
    retentionDays: 90
  database:
    host: ""          # If empty, deploys bundled PostgreSQL
    port: 5432
    name: phoenixgpu
    secretName: phoenixgpu-db-secret

# ── Bundled PostgreSQL (for quick start) ─────────────────────────
postgresql:
  enabled: true   # Set to false to use external DB
  auth:
    database: phoenixgpu
    existingSecret: ""
  primary:
    persistence:
      size: 20Gi

# ── WebUI ─────────────────────────────────────────────────────────
webui:
  enabled: true
  image:
    repository: webui
    tag: latest
  service:
    type: ClusterIP
    port: 80
  ingress:
    enabled: false
    className: nginx
    host: phoenixgpu.example.com

# ── Snapshot Storage ──────────────────────────────────────────────
snapshotStorage:
  backend: pvc      # pvc | s3
  pvc:
    storageClass: ""  # empty = default StorageClass
    size: 200Gi
  s3:
    bucket: ""
    endpoint: ""
    secretName: phoenixgpu-s3-secret

# ── Monitoring ────────────────────────────────────────────────────
monitoring:
  enabled: true
  serviceMonitor:
    enabled: false    # Enable if Prometheus Operator is installed
  dcgmExporter:
    enabled: true
    image: nvcr.io/nvidia/k8s/dcgm-exporter:3.3.5-3.4.0-ubuntu22.04
