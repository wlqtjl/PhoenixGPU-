name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build (default)
        run: go build ./...

      - name: Build (tagged components)
        run: |
          go build -tags=checkpointfull ./pkg/checkpoint/...
          go build -tags=billingfull ./pkg/billing/...
          go build -tags=controllerfull ./pkg/hacontroller/...
          go build -tags=k8sfull ./pkg/k8s/...

  vet:
    name: Vet
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Go vet
        run: go vet ./...

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Unit tests (default)
        run: go test -race -count=1 -coverprofile=coverage.out ./...

      - name: Unit tests (tagged)
        run: |
          go test -tags=billingfull -race -count=1 ./pkg/billing/...
          go test -tags=checkpointfull -race -count=1 ./pkg/checkpoint/...
          go test -tags=controllerfull -race -count=1 ./pkg/hacontroller/...

      - name: Coverage summary
        run: go tool cover -func=coverage.out | tail -5
